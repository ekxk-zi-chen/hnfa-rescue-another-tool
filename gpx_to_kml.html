<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJI 搜救航線優化轉檔</title>
    <style>
        :root { --primary: #ff9800; --bg: #1a1a1a; --card: #2d2d2d; --text: #eee; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 2px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: var(--primary); margin: 0 0 10px 0; text-align: center; }
        .warning { background: #442222; border-left: 5px solid #ff4444; padding: 10px; font-size: 0.85em; margin-bottom: 20px; color: #ffcccc; }
        .setting { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="file"] { background: #3d3d3d; width: 100%; padding: 10px; border-radius: 8px; border: 1px dashed #666; color: white; }
        input[type="number"] { background: white; color: black; font-size: 1.1em; }
        
        .btn-calc { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1.1em; font-weight: bold; transition: 0.2s; }
        .btn-export { background: #4caf50; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1.1em; font-weight: bold; transition: 0.2s; margin-top: 15px; display: none; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        
        .result-box { margin-top: 20px; padding: 15px; background: #333; border-radius: 8px; display: none; text-align: center; }
        .highlight { color: #ff9800; font-size: 1.3em; font-weight: bold; }
        small { color: #888; display: block; margin-top: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛸 DJI 航線轉檔器</h2>
    <div class="warning">
        ⚠️ <b>注意：</b> 本工具生成的 KML 僅供「地圖參考」，請勿在 DJI APP 中點擊「開始執行」自動航線。
    </div>
    
    <div class="setting">
        <label>1. 選擇 GPX 檔案</label>
        <input type="file" id="fileInput" accept=".gpx">
    </div>

    <div class="setting">
        <label>2. 抽稀靈敏度</label>
        <input type="number" id="epsilon" value="0.0005" step="0.0001" style="width: 100%; padding: 10px; border-radius: 5px; border:none;">
        <small>數字越大點越少。0.0005 = 約 50m 誤差</small>
    </div>

    <button id="calcBtn" class="btn-calc" onclick="calculatePoints()">1. 計算並預覽點數</button>

    <div id="resultBox" class="result-box">
        <div id="statusText"></div>
    </div>

    <button id="exportBtn" class="btn-export" onclick="exportKML()">2. 點數滿意！分享 / 匯出</button>
</div>

<script>
    // 全域變數，用來暫存準備要匯出的檔案資料
    let readyKmlFile = null;
    let readyFileName = "";
    let readyBlob = null;

    // 如果使用者重新選檔案或改數字，就隱藏匯出按鈕，強迫重新計算
    document.getElementById('fileInput').addEventListener('change', resetUI);
    document.getElementById('epsilon').addEventListener('input', resetUI);

    function resetUI() {
        document.getElementById('exportBtn').style.display = 'none';
        document.getElementById('resultBox').style.display = 'none';
        readyKmlFile = null;
    }

    // --- 步驟一：讀取檔案與計算 ---
    async function calculatePoints() {
        const fileInput = document.getElementById('fileInput');
        const epsilon = parseFloat(document.getElementById('epsilon').value);
        const resultBox = document.getElementById('resultBox');
        const statusText = document.getElementById('statusText');
        const exportBtn = document.getElementById('exportBtn');

        if (!fileInput.files.length) { alert("請先選擇 GPX 檔案！"); return; }
        
        statusText.innerHTML = "⏳ 計算中...";
        resultBox.style.display = 'block';
        exportBtn.style.display = 'none';
        
        const file = fileInput.files[0];

        try {
            const content = await file.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(content, "text/xml");
            let coords = [];
            const trkpts = xmlDoc.getElementsByTagName("trkpt");
            
            for (let i = 0; i < trkpts.length; i++) {
                const lat = trkpts[i].getAttribute("lat");
                const lon = trkpts[i].getAttribute("lon");
                const ele = trkpts[i].getElementsByTagName("ele")[0]?.textContent || "0";
                coords.push({lon, lat, ele});
            }

            if (!coords.length) { 
                statusText.innerHTML = "❌ 檔案內無效的 GPX 軌跡"; 
                return; 
            }

            // 智慧抽稀演算法
            let simplified = [coords[0]];
            for (let i = 1; i < coords.length; i++) {
                const last = simplified[simplified.length - 1];
                const curr = coords[i];
                const dist = Math.sqrt(Math.pow(curr.lon - last.lon, 2) + Math.pow(curr.lat - last.lat, 2));
                if (dist > epsilon) simplified.push(curr);
            }
            if (coords.length > 1) simplified.push(coords[coords.length-1]);

            // 準備 KML 內容
            const coordStr = simplified.map(c => `${c.lon},${c.lat},${c.ele}`).join("\n");
            const kmlBody = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>DJI_READY</name><Style id="s"><LineStyle><color>ff00ffff</color><width>6</width></LineStyle></Style><Placemark><name>⚠️手動參考線(勿點執行)</name><styleUrl>#s</styleUrl><LineString><tessellate>1</tessellate><altitudeMode>clampToGround</altitudeMode><coordinates>${coordStr}</coordinates></LineString></Placemark></Document></kml>`;

            readyFileName = `DJI_REF_${file.name.replace('.gpx','')}.kml`;
            readyBlob = new Blob([kmlBody], {type: 'application/vnd.google-earth.kml+xml'});
            readyKmlFile = new File([readyBlob], readyFileName, { type: "application/vnd.google-earth.kml+xml" });

            // 顯示計算結果，提示使用者
            statusText.innerHTML = `
                原始點數：${coords.length} 點<br>
                壓縮後剩餘：<span class="highlight">${simplified.length}</span> 點<br>
                <small style="margin-top:10px; color:#aaa;">(若覺得點數太多，請調大靈敏度後再次點擊計算)</small>
            `;
            
            // 顯示第二步的分享按鈕
            exportBtn.style.display = 'block';

        } catch (error) {
            console.error(error);
            statusText.innerHTML = "❌ 計算失敗: " + error.message;
        }
    }

    // --- 步驟二：觸發分享面板 (Safari 最愛這種乾淨的同步點擊) ---
    async function exportKML() {
        if (!readyKmlFile) return;
        
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        const statusText = document.getElementById('statusText');

        // 手機端優先使用原生分享面板
        if (isMobile && navigator.share && navigator.canShare && navigator.canShare({ files: [readyKmlFile] })) {
            try {
                await navigator.share({
                    files: [readyKmlFile],
                    title: "匯出 DJI 航線",
                    text: "DJI 參考航線檔案"
                });
                statusText.innerHTML += "<br><span style='color:#4caf50;'>✅ 已成功喚起分享面板！</span>";
                return;
            } catch (err) {
                if (err.name === 'AbortError') {
                    // 使用者自己按了取消分享，不算錯誤
                    return;
                }
                console.warn("分享面板呼叫失敗，改用傳統下載:", err);
            }
        }

        // 桌機版或手機分享失敗的備用下載方案
        const url = URL.createObjectURL(readyBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = readyFileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        statusText.innerHTML += "<br><span style='color:#4caf50;'>✅ 檔案已下載！</span>";
    }
</script>
</body>
</html>
