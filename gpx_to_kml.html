<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJI 搜救航線優化轉檔</title>
    <style>
        :root { --primary: #ff9800; --bg: #1a1a1a; --card: #2d2d2d; --text: #eee; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 2px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: var(--primary); margin: 0 0 10px 0; text-align: center; }
        .warning { background: #442222; border-left: 5px solid #ff4444; padding: 10px; font-size: 0.85em; margin-bottom: 20px; color: #ffcccc; }
        .setting { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="file"] { background: #3d3d3d; width: 100%; padding: 10px; border-radius: 8px; border: 1px dashed #666; color: white; }
        button { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1.1em; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        #status { margin-top: 20px; text-align: center; font-weight: bold; color: #4caf50; }
        small { color: #888; display: block; margin-top: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛸 DJI 航線轉檔器</h2>
    <div class="warning">
        ⚠️ <b>注意：</b> 本工具生成的 KML 僅供「地圖參考」，請勿在 DJI APP 中點擊「開始執行」自動航線，以免發生撞山危險。
    </div>
    
    <div class="setting">
        <label>1. 選擇 GPX 檔案</label>
        <input type="file" id="fileInput" accept=".gpx">
    </div>

    <div class="setting">
        <label>2. 抽稀靈敏度</label>
        <input type="number" id="epsilon" value="0.0005" step="0.0001" style="width: 100%; padding: 10px; border-radius: 5px; border:none;">
        <small>數字越大點越少。0.0005 = 約 50m 誤差 (推薦)</small>
        
    </div>

    <button onclick="processFile()">轉換並輸出 KML</button>
    <div id="status"></div>
</div>

<script>
    // 加上 async 確保整體流程是一氣呵成的
    async function processFile() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const epsilon = parseFloat(document.getElementById('epsilon').value);

        if (!fileInput.files.length) { alert("請先選擇檔案"); return; }
        
        status.innerText = "⏳ 處理中...";
        const file = fileInput.files[0];

        try {
            // 關鍵修改：改用 text() 直接非同步讀取，取代 FileReader 避開 Safari 阻擋
            const content = await file.text();
            
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(content, "text/xml");
            let coords = [];
            const trkpts = xmlDoc.getElementsByTagName("trkpt");
            
            for (let i = 0; i < trkpts.length; i++) {
                const lat = trkpts[i].getAttribute("lat");
                const lon = trkpts[i].getAttribute("lon");
                const ele = trkpts[i].getElementsByTagName("ele")[0]?.textContent || "0";
                coords.push({lon, lat, ele});
            }

            if (!coords.length) { alert("無效 GPX"); status.innerText = ""; return; }

            // 智慧抽稀 (RDP 簡化邏輯)
            let simplified = [coords[0]];
            for (let i = 1; i < coords.length; i++) {
                const last = simplified[simplified.length - 1];
                const curr = coords[i];
                const dist = Math.sqrt(Math.pow(curr.lon - last.lon, 2) + Math.pow(curr.lat - last.lat, 2));
                if (dist > epsilon) simplified.push(curr);
            }
            if (coords.length > 1) simplified.push(coords[coords.length-1]);

            // 生成 KML 字串
            const coordStr = simplified.map(c => `${c.lon},${c.lat},${c.ele}`).join("\n");
            const kmlBody = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>DJI_READY</name><Style id="s"><LineStyle><color>ff00ffff</color><width>6</width></LineStyle></Style><Placemark><name>⚠️手動參考線(勿點執行)</name><styleUrl>#s</styleUrl><LineString><tessellate>1</tessellate><altitudeMode>clampToGround</altitudeMode><coordinates>${coordStr}</coordinates></LineString></Placemark></Document></kml>`;

            const fileName = `DJI_REF_${file.name.replace('.gpx','')}.kml`;
            const blob = new Blob([kmlBody], {type: 'application/vnd.google-earth.kml+xml'});
            const kmlFile = new File([blob], fileName, { type: "application/vnd.google-earth.kml+xml" });

            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

            // 針對手機端 (LINE 與 Safari) 的原生分享處理
            if (isMobile && navigator.share && navigator.canShare && navigator.canShare({ files: [kmlFile] })) {
                try {
                    await navigator.share({
                        files: [kmlFile],
                        title: "匯出 DJI 航線",
                        text: "這是優化過後的 DJI 參考航線檔案"
                    });
                    status.innerText = `✅ 轉換並分享成功！點數：${simplified.length}`;
                    return; 
                } catch (err) {
                    // 處理使用者手動按取消分享的狀況，不把它當作錯誤
                    if (err.name === 'AbortError') {
                        status.innerText = `✅ 轉換完成！點數：${simplified.length} (取消分享)`;
                        return;
                    }
                    console.warn("分享面板呼叫失敗，改用傳統下載:", err);
                }
            }

            // 備用方案：傳統下載 (針對電腦版、或不支援分享的手機環境)
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url); // 釋放記憶體
            
            status.innerText = `✅ 轉換並下載成功！點數：${simplified.length}`;

        } catch (error) {
            console.error("轉換錯誤:", error);
            status.innerText = "❌ 轉換失敗: " + error.message;
        }
    }
</script>
</body>
</html>
